name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build-binaries:
    name: Build Linux binary (${{ matrix.arch_label }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch_label: amd64
          - runner: ubuntu-24.04-arm
            arch_label: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --locked --release

      - name: Package release artifact
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p dist
          archive="resource-tracker-${TAG}-linux-${{ matrix.arch_label }}.tar.gz"
          tar -czf "dist/${archive}" -C target/release resource-tracker -C "$GITHUB_WORKSPACE" README.md LICENSE
          sha256sum "dist/${archive}" > "dist/${archive}.sha256"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-linux-${{ matrix.arch_label }}
          path: dist/*

  publish-crate:
    name: Publish crate on crates.io
    runs-on: ubuntu-latest
    needs: build-binaries
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Publish crate
        run: cargo publish --locked

  github-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-binaries
      - publish-crate
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create GitHub release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/**/*.tar.gz
            dist/**/*.sha256
