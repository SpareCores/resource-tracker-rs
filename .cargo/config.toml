[env]
# Mock TCP server tests bind ephemeral ports and T-UREQ-01 counts live
# threads mid-request; both require serial test execution. [test] threads
# is not a valid Cargo config key -- it is silently ignored. The correct
# mechanism is RUST_TEST_THREADS, which the compiled test binary reads.
RUST_TEST_THREADS = { value = "1", force = true }
